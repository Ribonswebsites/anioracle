<style>
:root{--bg:#000007;--bg2:#05030f;--bg3:#0a0720;--bg4:#0f0b28;--line:rgba(255,255,255,.07);--line2:rgba(255,255,255,.13);--snow:#f5f2ff;--snow2:rgba(245,242,255,.72);--snow3:rgba(245,242,255,.44);--snow4:rgba(245,242,255,.22);--pu:#8B5CF6;--pu2:#A78BFA;--pu3:#C4B5FD;--pk:#EC4899;--pk2:#F472B6;--ff:'Sora',system-ui,sans-serif;--fs:'Noto Serif Display',Georgia,serif;--ease:cubic-bezier(0.16,1,.3,1)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-tap-highlight-color:transparent;overscroll-behavior:none}
body{font-family:var(--ff);background:var(--bg);color:var(--snow);min-height:100dvh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:0;height:0}
img{display:block}
button{cursor:pointer;font-family:var(--ff);border:none;background:none}

/* HEADER */
.hdr{position:sticky;top:0;z-index:200;height:58px;background:rgba(0,0,7,.9);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--line2);display:flex;align-items:center;gap:12px;padding:0 16px}
.hdr-back{width:36px;height:36px;border-radius:10px;background:rgba(255,255,255,.06);border:1px solid var(--line2);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:background .15s}
.hdr-back:active{background:rgba(255,255,255,.14)}
.hdr-center{flex:1;display:flex;align-items:center;gap:8px}
.hdr-logo-img{width:28px;height:28px;object-fit:contain}
.hdr-title{font-size:.8rem;font-weight:900;letter-spacing:-.02em}
.hdr-title span{background:linear-gradient(135deg,#8B5CF6,#EC4899);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.hdr-pill{padding:4px 12px;border-radius:20px;background:rgba(139,92,246,.12);border:1px solid rgba(139,92,246,.3);font-size:.48rem;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--pu3);flex-shrink:0}

/* HERO */
.hero{position:relative;height:240px;overflow:hidden}
.hslide{position:absolute;inset:0;opacity:0;transition:opacity 1.2s ease}
.hslide.on{opacity:1}
.hslide img{width:100%;height:100%;object-fit:cover;object-position:center top;filter:brightness(.48) saturate(1.3)}
.hov{position:absolute;inset:0;z-index:2;pointer-events:none;background:linear-gradient(to bottom,rgba(0,0,7,.45) 0%,transparent 28%,transparent 52%,rgba(0,0,7,.96) 100%)}
.hglow{position:absolute;inset:0;z-index:2;pointer-events:none;background:radial-gradient(ellipse 80% 60% at 50% 50%,rgba(139,92,246,.14) 0%,transparent 70%)}
.hcontent{position:absolute;bottom:0;left:0;right:0;z-index:5;padding:0 20px 22px;text-align:center}
.hpill{display:inline-flex;align-items:center;gap:6px;padding:4px 14px;border-radius:20px;background:rgba(0,0,0,.62);border:1px solid rgba(139,92,246,.4);backdrop-filter:blur(8px);font-size:.46rem;font-weight:800;letter-spacing:.18em;text-transform:uppercase;color:var(--pu3);margin-bottom:10px}
.hdot-anim{width:5px;height:5px;border-radius:50%;background:var(--pu);animation:lp 1.5s ease-in-out infinite}
@keyframes lp{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.7)}}
.hh1{font-size:2.2rem;font-weight:900;letter-spacing:-.04em;line-height:1;color:#fff;text-shadow:0 2px 20px rgba(0,0,0,.8);margin-bottom:5px}
.hh1 em{font-family:var(--fs);font-style:italic;background:linear-gradient(135deg,#C4B5FD,#EC4899);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.hsub{font-size:.62rem;color:var(--snow3)}
.hdots{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);z-index:6;display:flex;gap:5px}
.hdot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.3);transition:all .3s}
.hdot.on{background:#fff;width:14px;border-radius:5px}

/* SEARCH */
.srch{padding:14px 16px 6px;position:relative}
.srch-inp{width:100%;padding:11px 16px 11px 40px;border-radius:14px;background:rgba(255,255,255,.06);border:1px solid var(--line2);color:var(--snow);font-size:.76rem;font-family:var(--ff);outline:none;transition:border-color .2s}
.srch-inp:focus{border-color:rgba(139,92,246,.5)}
.srch-ico{position:absolute;left:28px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--snow4)}

/* CATS */
.cats{display:flex;gap:8px;overflow-x:auto;padding:0 16px 10px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.cats::-webkit-scrollbar{display:none}
.cat{flex-shrink:0;padding:7px 16px;border-radius:20px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:var(--snow3);font-size:.6rem;font-weight:700;font-family:var(--ff);cursor:pointer;transition:all .2s;white-space:nowrap}
.cat.on{background:linear-gradient(135deg,rgba(139,92,246,.2),rgba(236,72,153,.12));border-color:rgba(139,92,246,.5);color:var(--pu3)}
.cat:active{transform:scale(.94)}

/* STATS */
.sbar{display:flex;align-items:center;justify-content:space-between;padding:4px 16px 10px}
.scnt{font-size:.58rem;color:var(--snow4);font-weight:600}
.ssort{display:flex;align-items:center;gap:5px;font-size:.56rem;color:var(--pu2);font-weight:700;cursor:pointer}

/* GRID */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 16px}

/* CARD */
.wcard{position:relative;border-radius:14px;overflow:hidden;aspect-ratio:16/9;cursor:pointer;background:var(--bg3);box-shadow:0 4px 18px rgba(0,0,0,.6);transition:transform .2s var(--ease)}
.wcard:active{transform:scale(.95)}
.wcard img{width:100%;height:100%;object-fit:cover;object-position:center top;display:block}
.wcard-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,7,.9) 0%,rgba(0,0,7,.3) 40%,transparent 65%);opacity:0;transition:opacity .2s;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:0 10px 10px}
.wcard:active .wcard-ov{opacity:1}
.wcard-btn{display:flex;align-items:center;gap:5px;padding:6px 14px;border-radius:20px;background:linear-gradient(135deg,#8B5CF6,#EC4899);color:#fff;font-size:.52rem;font-weight:800;font-family:var(--ff);border:none;cursor:pointer;box-shadow:0 4px 12px rgba(139,92,246,.5)}
.wcard-tag{position:absolute;top:7px;left:7px;padding:2px 8px;border-radius:6px;background:rgba(0,0,0,.68);backdrop-filter:blur(8px);font-size:.42rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:rgba(245,242,255,.7);border:1px solid rgba(255,255,255,.1)}
.empty{grid-column:1/-1;text-align:center;padding:52px 20px;color:var(--snow4);font-size:.76rem}

/* LOAD MORE */
.lmw{padding:16px 16px 14px}
.lmbtn{width:100%;padding:14px;border-radius:16px;background:rgba(139,92,246,.08);border:1px solid rgba(139,92,246,.25);color:var(--pu3);font-size:.75rem;font-weight:800;font-family:var(--ff);cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s}
.lmbtn:active{background:rgba(139,92,246,.18)}

/* FOOTER */
.footer{padding:28px 20px calc(28px + env(safe-area-inset-bottom,0px));background:var(--bg2);border-top:1px solid var(--line);text-align:center;display:flex;flex-direction:column;align-items:center;gap:12px;margin-top:16px}
.flogo{display:flex;align-items:center;gap:8px}
.flogo img{width:38px;height:38px;object-fit:contain;filter:drop-shadow(0 0 14px rgba(139,92,246,.5))}
.fname{font-size:1.15rem;font-weight:900;letter-spacing:-.03em}
.fname span{background:linear-gradient(135deg,#8B5CF6,#EC4899);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.fsub{font-size:.54rem;color:var(--snow4);letter-spacing:.06em;text-transform:uppercase}
.fnav{display:flex;gap:18px;flex-wrap:wrap;justify-content:center}
.fnav a{font-size:.62rem;font-weight:600;color:var(--snow3);cursor:pointer}
.fnav a:active{color:var(--pu3)}
.fcopy{font-size:.52rem;color:var(--snow4);line-height:1.7}
.fcopy a{color:var(--pu2)}
.frib{display:flex;align-items:center;gap:6px;opacity:.38}
.frib span{font-size:.48rem;font-weight:800;letter-spacing:.18em;text-transform:uppercase}

/* TOAST */
.toast{position:fixed;bottom:calc(76px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%) translateY(16px);background:rgba(16,185,129,.96);color:#fff;padding:10px 20px;border-radius:20px;font-size:.66rem;font-weight:800;font-family:var(--ff);display:flex;align-items:center;gap:7px;box-shadow:0 8px 24px rgba(0,0,0,.5);opacity:0;transition:all .3s var(--ease);pointer-events:none;white-space:nowrap;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

  var l=WALLS.slice();
  if(curF!=='all')l=l.filter(function(w){return w.cat===curF;});
  if(curS){var q=curS.toLowerCase();l=l.filter(function(w){return w.label.toLowerCase().includes(q)||w.cat.toLowerCase().includes(q);});}
  if(!sortNew)l=l.slice().reverse();
  return l;
}

window.setFilter=function(f,btn){
  curF=f;curS='';document.getElementById('srchInp').value='';
  document.querySelectorAll('.cat').forEach(function(b){b.classList.remove('on');});btn.classList.add('on');
  reset();
};
window.doSearch=function(v){curS=v;reset();};
window.toggleSort=function(){
  sortNew=!sortNew;
  document.getElementById('sortLbl').textContent=sortNew?'Newest':'Oldest';
  reset();
};

function reset(){
  curPage=0;curList=getFiltered();
  document.getElementById('wgrid').innerHTML='';
  appendPage();
  document.getElementById('scnt').textContent=curList.length+' wallpapers';
}

function appendPage(){
  var grid=document.getElementById('wgrid');
  var slice=curList.slice(curPage*PAGE,(curPage+1)*PAGE);
  if(!slice.length&&curPage===0){grid.innerHTML='<div class="empty">No wallpapers found</div>';return;}
  slice.forEach(function(w){
    var c=document.createElement('div');c.className='wcard';
    c.innerHTML='<img src="'+w.src+'" loading="lazy" onerror="this.parentNode.style.display=\'none\'">'
      +'<div class="wcard-tag">'+w.label+'</div>'
      +'<div class="wcard-ov"><button class="wcard-btn">'
      +'<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>'
      +' Download</button></div>';
    c.onclick=function(){dlWall(w.src);};
    grid.appendChild(c);
  });
  curPage++;
  var shown=curPage*PAGE;
  var lmw=document.getElementById('lmw');
  if(shown<curList.length){
    lmw.style.display='block';
    document.getElementById('lmcnt').textContent='('+(curList.length-shown)+' more)';
  }else{lmw.style.display='none';}
}

window.loadMore=function(){appendPage();};

function dlWall(src){
  var a=document.createElement('a');a.href=src;a.download=src.split('/').pop();
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  var t=document.getElementById('toast');t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2200);
}

reset();
</script>
</body>
</html>
